<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>원당점 발주·입고</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow-x:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f5f7;min-height:100vh}
  .screen{display:none}.screen.active{display:block}
  .container{width:100%;max-width:500px;margin:0 auto;padding:24px 20px 60px}
  .brand{font-size:24px;font-weight:700;color:#1c1c1e;margin-bottom:6px}
  .brand-loc{display:inline-block;background:#ede9fe;color:#5b21b6;font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:24px}
  .s1-label{font-size:13px;font-weight:600;color:#8e8e93;letter-spacing:.04em;margin-bottom:12px}
  .type-card{display:flex;align-items:center;gap:16px;padding:20px 18px;border-radius:16px;border:2px solid #e0e0e0;background:#fff;margin-bottom:12px;cursor:pointer;transition:all .15s}
  .tc-order{border-color:#7c3aed;background:#faf5ff}
  .tc-stock{border-color:#059669;background:#f0fdf9}
  .tc-icon{font-size:34px;flex-shrink:0}
  .tc-main{font-size:17px;font-weight:700;color:#1c1c1e}
  .tc-sub{font-size:13px;color:#8e8e93;margin-top:3px}
  .tc-time{margin-left:auto;font-size:13px;font-weight:700;padding:5px 12px;border-radius:20px;color:#fff}
  .tc-order .tc-time{background:#7c3aed}
  .tc-stock .tc-time{background:#059669}
  .top-bar{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .back-btn{width:40px;height:40px;border-radius:12px;background:#fff;border:1.5px solid #e0e0e0;display:flex;align-items:center;justify-content:center;font-size:20px;color:#636366}
  .page-title{font-size:18px;font-weight:700;color:#1c1c1e}
  .page-sub{font-size:13px;color:#8e8e93}
  .date-pill{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;padding:12px 16px;margin-bottom:22px}
  .dp-label{font-size:12px;color:#8e8e93}
  .dp-val{font-size:16px;font-weight:700;color:#1c1c1e}
  .sec-title{font-size:12px;font-weight:700;color:#8e8e93;margin:22px 0 10px;padding-bottom:7px;border-bottom:1.5px solid #e0e0e0}
  .field-card{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-radius:14px;background:#fff;border:1.5px solid #e0e0e0;margin-bottom:10px}
  .fc-label{font-size:16px;font-weight:600;color:#1c1c1e}
  .fc-hint{font-size:12px;color:#8e8e93}
  .fc-right{display:flex;align-items:baseline;gap:5px}
  .fc-val{font-size:28px;font-weight:700;color:#1c1c1e;min-width:52px;text-align:right}
  .fc-val.empty{color:#c7c7cc}
  .fc-unit{font-size:14px;color:#8e8e93}
  .check-row{display:flex;gap:10px;flex-wrap:wrap}
  .check-chip{padding:10px 18px;border-radius:20px;font-size:15px;font-weight:600;border:1.5px solid #e0e0e0;background:#fff;color:#636366;transition:all .15s}
  .chip-on-o{background:#ede9fe;border-color:#7c3aed;color:#5b21b6}
  .chip-on-s{background:#d1fae5;border-color:#059669;color:#065f46}
  .submit-btn{width:100%;padding:18px;border-radius:16px;font-size:17px;font-weight:700;border:none;margin-top:28px;cursor:pointer}
  .sb-o{background:#7c3aed;color:#fff}
  .sb-s{background:#059669;color:#fff}
  .dial-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center}
  .dial-ov.show{display:flex}
  .dial-sheet{background:#fff;border-radius:24px 24px 0 0;padding:20px 16px 40px;width:100%}
  .dial-lbl{font-size:13px;color:#8e8e93;margin-bottom:6px}
  .dial-disp{font-size:52px;font-weight:700;text-align:right;padding:8px 8px 14px;border-bottom:1.5px solid #e0e0e0;margin-bottom:14px;display:flex;align-items:center;justify-content:flex-end;gap:8px}
  .d-num{color:#1c1c1e}
  .d-hint{font-size:18px;color:#c7c7cc}
  .d-unit{font-size:20px;color:#8e8e93}
  .dk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .dk{height:64px;border-radius:14px;background:#f5f5f7;font-size:24px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .dk-sp{background:#e8e8ed;font-size:18px}
  .dk-ok{color:#fff;font-size:17px;font-weight:700;grid-column:1/-1;height:58px;border-radius:16px}
  .dk-ok-o{background:#7c3aed}
  .dk-ok-s{background:#059669}
  .done-wrap{padding:48px 0 24px;text-align:center}
  .done-icon{font-size:64px;margin-bottom:18px}
  .done-title{font-size:22px;font-weight:700}
  .msg-preview{text-align:left;background:#f5f5f7;border-radius:14px;padding:16px 18px;margin-top:20px}
  .mp-body{font-size:13px;font-family:monospace;white-space:pre;line-height:1.8}
  .loading-ov{display:none;position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:999;flex-direction:column;align-items:center;justify-content:center}
  .loading-ov.show{display:flex}
  .spinner{width:44px;height:44px;border:4px solid #e0e0e0;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="screen active" id="s1">
  <div class="container">
    <div class="brand">🥩 장수한우곱창</div>
    <div class="brand-loc">🟣 원당 본점</div>
    <div class="s1-label">입력 유형을 선택하세요</div>
    <div class="type-card tc-order" onclick="go('order')">
      <div class="tc-icon">📋</div>
      <div><div class="tc-main">발주 입력</div><div class="tc-sub">현재 재고 → 자동 발주</div></div>
      <div class="tc-time">22:00</div>
    </div>
    <div class="type-card tc-stock" onclick="go('stock')">
      <div class="tc-icon">📦</div>
      <div><div class="tc-main">입고 입력</div><div class="tc-sub">오늘 실제 입고량 입력</div></div>
      <div class="tc-time">15:00</div>
    </div>
  </div>
</div>

<div class="screen" id="s-order">
  <div class="container">
    <div class="top-bar"><div class="back-btn" onclick="goS1()">←</div><div><div class="page-title">📋 발주 입력</div><div class="page-sub">원당 본점</div></div></div>
    <div class="date-pill"><span class="dp-label">발주일</span><span class="dp-val" id="date-o"></span></div>
    <div class="sec-title">곱창 재고</div>
    <div class="field-card" onclick="openDial('o-gu','곱창 · 쓰고 있는 것','o',true)"><div><div class="fc-label">쓰고 있는 것</div></div><div class="fc-right"><div class="fc-val empty" id="o-gu">-</div><div class="fc-unit">보</div></div></div>
    <div class="field-card" onclick="openDial('o-gd','곱창 · 연육 완료','o',true)"><div><div class="fc-label">연육 완료</div></div><div class="fc-right"><div class="fc-val empty" id="o-gd">-</div><div class="fc-unit">보</div></div></div>
    <div class="field-card" onclick="openDial('o-gi','곱창 · 연육 중','o',true)"><div><div class="fc-label">연육 중</div></div><div class="fc-right"><div class="fc-val empty" id="o-gi">-</div><div class="fc-unit">보</div></div></div>
    <div class="sec-title">대창 · 막창</div>
    <div class="field-card" onclick="openDial('o-dc','대창 발주량','o',false)"><div><div class="fc-label">대창</div></div><div class="fc-right"><div class="fc-val empty" id="o-dc">-</div><div class="fc-unit">보</div></div></div>
    <div class="field-card" onclick="openDial('o-mc','막창 발주량','o',false)"><div><div class="fc-label">막창</div></div><div class="fc-right"><div class="fc-val empty" id="o-mc">-</div><div class="fc-unit">보</div></div></div>
    <div class="sec-title">추가 주문</div>
    <div class="check-row" id="chips-o">
      <div class="check-chip" onclick="toggleChip(this,'o')">벌집양</div><div class="check-chip" onclick="toggleChip(this,'o')">천엽</div><div class="check-chip" onclick="toggleChip(this,'o')">간</div><div class="check-chip" onclick="toggleChip(this,'o')">내장</div>
    </div>
    <button class="submit-btn sb-o" onclick="submitOrder()">발주 제출하기</button>
  </div>
</div>

<div class="screen" id="s-stock">
  <div class="container">
    <div class="top-bar"><div class="back-btn" onclick="goS1()">←</div><div><div class="page-title">📦 입고 입력</div><div class="page-sub">원당 본점</div></div></div>
    <div class="date-pill"><span class="dp-label">입고일</span><span class="dp-val" id="date-s"></span></div>
    <div class="field-card stock-card" onclick="openDial('s-gc','곱창 입고량','s',false)"><div><div class="fc-label">곱창</div></div><div class="fc-right"><div class="fc-val empty" id="s-gc">-</div><div class="fc-unit">보</div></div></div>
    <div class="field-card stock-card" onclick="openDial('s-dc','대창 입고량','s',false)"><div><div class="fc-label">대창</div></div><div class="fc-right"><div class="fc-val empty" id="s-dc">-</div><div class="fc-unit">보</div></div></div>
    <div class="field-card stock-card" onclick="openDial('s-mc','막창 입고량','s',false)"><div><div class="fc-label">막창</div></div><div class="fc-right"><div class="fc-val empty" id="s-mc">-</div><div class="fc-unit">보</div></div></div>
    <div class="sec-title">기타 입고</div>
    <div class="check-row" id="chips-s">
      <div class="check-chip" onclick="toggleChip(this,'s')">벌집양</div><div class="check-chip" onclick="toggleChip(this,'s')">천엽</div><div class="check-chip" onclick="toggleChip(this,'s')">간</div><div class="check-chip" onclick="toggleChip(this,'s')">내장</div>
    </div>
    <button class="submit-btn sb-s" onclick="submitStock()">입고 제출하기</button>
  </div>
</div>

<div class="screen" id="s-done">
  <div class="container">
    <div class="done-wrap">
      <div class="done-icon">✅</div><div class="done-title" id="done-title">완료</div>
      <div class="msg-preview"><div class="mp-body" id="mp-body"></div></div>
      <button class="submit-btn" style="background:#e0e0e0;color:#1c1c1e" onclick="goS1()">처음으로</button>
    </div>
  </div>
</div>

<div class="dial-ov" id="dial-ov" onclick="dialClose(event)">
  <div class="dial-sheet" onclick="event.stopPropagation()">
    <div class="dial-lbl" id="dial-lbl"></div>
    <div class="dial-disp" id="dial-disp"></div>
    <div class="dk-grid">
      <div class="dk" onclick="dk('1')">1</div><div class="dk" onclick="dk('2')">2</div><div class="dk" onclick="dk('3')">3</div>
      <div class="dk" onclick="dk('4')">4</div><div class="dk" onclick="dk('5')">5</div><div class="dk" onclick="dk('6')">6</div>
      <div class="dk" onclick="dk('7')">7</div><div class="dk" onclick="dk('8')">8</div><div class="dk" onclick="dk('9')">9</div>
      <div class="dk dk-sp" id="dk-dot" onclick="dk('.')">·</div><div class="dk" onclick="dk('0')">0</div><div class="dk dk-sp" onclick="dkDel()">⌫</div>
      <div class="dk dk-ok" id="dk-ok" onclick="dkOk()">확인</div>
    </div>
  </div>
</div>

<div class="loading-ov" id="loading"><div class="spinner"></div></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx47OdbrHG1JQwEjMQbq2_bZ-RluuMMIwuXCm-ZZ9MrUswkrIISXWer4w2CFw63oHiCHQ/exec';
const DAYS=['일','월','화','수','목','금','토'];
const today=new Date();
const fmt=d=>String(d.getFullYear()).slice(2)+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+'('+DAYS[d.getDay()]+')';
document.getElementById('date-o').textContent=fmt(today);
document.getElementById('date-s').textContent=fmt(today);

function go(t){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('s-'+t).classList.add('active');window.scrollTo(0,0);}
function goS1(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('s1').classList.add('active');resetAll();}
function resetAll(){['o-gu','o-gd','o-gi','o-dc','o-mc','s-gc','s-dc','s-mc'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent='-';el.classList.add('empty');}});document.querySelectorAll('.check-chip').forEach(c=>c.classList.remove('chip-on-o','chip-on-s'));}
function toggleChip(el,t){el.classList.toggle(t==='o'?'chip-on-o':'chip-on-s');}

let dTarget=null,dBuf='',dDot=true,dHas=false;
function openDial(id,lbl,t,dot){
  dTarget=document.getElementById(id);dBuf='';dDot=dot;dHas=false;
  document.getElementById('dial-lbl').textContent=lbl;
  document.getElementById('dk-ok').className='dk dk-ok '+(t==='o'?'dk-ok-o':'dk-ok-s');
  renderDisp();
  document.getElementById('dial-ov').classList.add('show');
}

// ── 핵심 수정 부분: '.' 입력 시 '0.' 자동 완성 ─────────────
function dk(k){
  if(k==='.' && (!dDot || dBuf.includes('.'))) return;
  if(!dHas){
    if(k==='.') dBuf='0.'; // 처음부터 '.' 누르면 '0.'으로 시작
    else dBuf=k;
    dHas=true;
  } else {
    if(dBuf==='0' && k!=='.') dBuf=k;
    else dBuf+=k;
  }
  if(dBuf.length>5) return;
  renderDisp();
}
// ────────────────────────────────────────────────────────────

function renderDisp(){
  const el=document.getElementById('dial-disp');
  el.innerHTML=dHas?`<span class="d-num">${dBuf}</span><span class="d-unit">보</span>`:`<span class="d-hint">숫자 입력</span><span class="d-unit">보</span>`;
}
function dkDel(){if(!dHas)return;dBuf=dBuf.slice(0,-1);if(dBuf===''){dHas=false;}renderDisp();}
function dkOk(){if(dTarget){if(!dHas)dTarget.textContent='-';else{dTarget.textContent=dBuf.replace(/\.$/,'');dTarget.classList.remove('empty');}}document.getElementById('dial-ov').classList.remove('show');}
function dialClose(e){document.getElementById('dial-ov').classList.remove('show');}

function gv(id){const t=document.getElementById(id).textContent;return t==='-'?0:parseFloat(t);}
function submitOrder(){
  const gu=gv('o-gu'),gd=gv('o-gd'),gi=gv('o-gi'),dc=gv('o-dc'),mc=gv('o-mc');
  const ex=Array.from(document.querySelectorAll('#chips-o .chip-on-o')).map(c=>c.textContent);
  if(gu+gd+gi===0){alert('재고를 입력해주세요.');return;}
  document.getElementById('loading').classList.add('show');
  const payload={type:'order',gc_use:gu,gc_done:gd,gc_ing:gi,dc,mc,extras:ex};
  fetch(GAS_URL, {
  method: 'POST',
  mode: 'no-cors', // 구글 서버 특성상 no-cors 유지
  headers: { 'Content-Type': 'text/plain' }, // 데이터가 더 잘 전달되도록 설정
  body: JSON.stringify(payload)
})
function submitStock(){
  const gc=gv('s-gc'),dc=gv('s-dc'),mc=gv('s-mc');
  const ex=Array.from(document.querySelectorAll('#chips-s .chip-on-s')).map(c=>c.textContent);
  document.getElementById('loading').classList.add('show');
  fetch(GAS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({type:'stock',gc,dc,mc,extras:ex})}).then(()=>{
    document.getElementById('loading').classList.remove('show');
    document.getElementById('mp-body').textContent=`[입고완료]\n곱창: ${gc}보\n대창: ${dc}보\n막창: ${mc}보\n추가: ${ex.join(',')}\n기록 완료 ✅`;
    go('done');
  });
}
</script>
</body>
</html>
